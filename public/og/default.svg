<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative archive "windows" -->
  <g opacity="0.12" fill="none" stroke="#60a5fa" stroke-width="3">
    <rect x="760" y="120" width="320" height="200" rx="12"/>
    <rect x="800" y="180" width="320" height="200" rx="12"/>
    <rect x="840" y="240" width="320" height="200" rx="12"/>
  </g>
  <g transform="translate(90,150)">
    <g transform="translate(0,0)">
      <rect width="64" height="64" rx="16" fill="url(#accent)"/>
      <circle cx="32" cy="32" r="19" fill="none" stroke="#fff" stroke-width="4"/>
      <path d="M32 21v12l8 5" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="84" y="44" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="700">Website History Viewer</text>
  </g>
  <text x="90" y="320" fill="#ffffff" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="800">See what any website</text>
  <text x="90" y="404" fill="#ffffff" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="800">looked like <tspan fill="#60a5fa">in the past</tspan></text>
  <text x="90" y="478" fill="#cbd5e1" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="500">Archived screenshots &amp; comparisons from the Wayback Machine</text>
</svg>
